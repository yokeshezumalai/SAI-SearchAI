<html>
  <head>
    <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body {
      margin: 0;
      background: #f7f7f8;
      color: #0f172a;
      display: flex;
      height: 100vh;
    }
    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #max_spent {
      height: 10px;
      padding: 0; /* Removes default padding */
      line-height: 1.2; /* Sets line height to 1.2 times the font size */
      font-size: 16px; /* Sets a specific, smaller font size */

    }
    #result_content {
      height: 10px;
      padding: 0; /* Removes default padding */
      line-height: 1.2; /* Sets line height to 1.2 times the font size */
      font-size: 16px; /* Sets a specific, smaller font size */

    }
    </style>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function decodeHtml(html) {
          const txt = document.createElement("textarea");
          txt.innerHTML = html;
          return txt.value;
        }

        function pythonToJson(str) {
          // Convert keys: 'text' → "text"
          str = str.replace(/'([a-zA-Z0-9_]+)'\s*:/g, '"$1":');

          // Convert values: : 'value' → : "value"
          str = str.replace(/:\s*'([^']*)'/g, ': "$1"');

          return str;
        }

        function parseInput(input) {
          let decoded = decodeHtml(input);
          let jsonSafe = pythonToJson(decoded);
          return JSON.parse(jsonSafe);
        }

      function drawChart() {

        const highest = "{{ highest }}"
        const { name, amount } = parseInput(highest);

        document.getElementById("max_spent").textContent = "Highest Spent: " + name + " - $" + amount;

        document.getElementById("result_content").textContent = "Total Amount spent for: {{ category }}" + " - $" + "{{total}}";
        const chartData = "{{ chart_data }}"
        const data = Array.isArray(chartData) ? chartData : parseInput(chartData);


        console.log(data);
        console.log(Array.isArray(chartData)); // must be true

        const dataTable = google.visualization.arrayToDataTable(data);

          var options = {
            title: "{{ query }}",
            is3D: true,
          };

          var chart = new google.visualization.PieChart(document.getElementById('piechart_3d'));

          chart.draw(dataTable, options);
      }
    </script>
      </script>
  </head>
   <main class="main">
      <body>
        <div id="piechart_3d" style="width: 900px; height: 500px;"></div>


        <h4 id="max_spent"></h4>
        <h4 id="result_content"></h4>
      </body>
   </main>
 
</html>
